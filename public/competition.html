<!DOCTYPE html>
<html>
<head>
  <title>Competition</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Background -->
<canvas id="bgCanvas"></canvas>

<!-- HEADER -->
<div class="header">
  <h1>
    <center>Code Building<span> Challenge</span></center>
  </h1>
</div>

<!-- MAIN QUESTION AREA -->
<div class="question-container">
  <!-- 🔥 Everything (question, options, button) will be generated by JS -->
</div>

<!-- 🔥 POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">

    <div id="popup-icon" class="popup-icon">!</div>

    <h2 id="popup-title">Error</h2>

    <p id="popup-message">
      Something went wrong
    </p>

<button class="btn primary">Ok</button>
  </div>
</div>

<!-- Scripts -->
<script src="script.js"></script>
<script src="competition.js"></script>

</body>
</html>
