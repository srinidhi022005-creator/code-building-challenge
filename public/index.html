<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Code Building Challenge</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

  <!-- Background Canvas -->
  <canvas id="bgCanvas"></canvas>

  <!-- Main Content -->
  <div class="container">
    <div class="event-header">
    <h1>ANVIKSHA 2026</h1>
    <h3><span>Code Arena</span></h3>
</div>

    <p class="top-text">
      PARTICIPANTS ARE WELCOME TO THE
    </p>
    <h2><u>Round 3:</u></h2> 
    <h1>
      Code Building <br>
      <span>Challenge</span>
    </h1>

    <p class="subtitle">
      Construct Python programs line by line.
      Test your precision and logic.
    </p>

    <!-- Buttons -->
    <div class="buttons">

      <!-- ✅ UPDATED -->
      <button class="btn home-btn primary" onclick="showSignup()">
        Sign Up
      </button>

      <!-- ✅ UPDATED -->
      <button class="btn home-btn secondary" onclick="showLogin()">
        Sign In
      </button>

    </div>

    <!-- Signup Form -->
    <div id="signupForm" class="form hidden">
      <p style="font-size: 12px; color: #a78bfa; margin-top: 5px;">
  • Password should be at least 8 characters <br>
  • Must contain alphabets, numbers & 1 special character
      </p>

      <input type="text" id="signupName1" placeholder="Participant 1">
      <input type="text" id="signupName2" placeholder="Participant 2">

      <input type="password" id="signupPassword" placeholder="Create Password">

      <input type="password" id="confirmPassword" placeholder="Confirm Password">

      <button class="btn primary" onclick="signupUser()">
        Create Account
      </button>

    </div>

    <!-- Login Form -->
    <div id="loginForm" class="form hidden">

  <input type="text" id="loginName1" placeholder="Participant 1">
  <input type="text" id="loginName2" placeholder="Participant 2">

  <input type="password" id="loginPassword" placeholder="Password">

  <button class="btn primary" onclick="loginUser(); return false;">
    Login
  </button>

</div>

  </div>

  <script src="script.js"></script>

  <!-- 🔥 CUSTOM POPUP -->
  <div id="popup" class="popup hidden">
    <div class="popup-box">

      <div id="popup-icon" class="popup-icon">!</div>

      <h2 id="popup-title">Error</h2>

      <p id="popup-message">
        Something went wrong
      </p>

      <button id="popup-btn" class="btn primary" onclick="closePopup()">
        OK
      </button>

    </div>
  </div>

</body>
</html>
